spring:
  application:
    name: dependency-risk-graph
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

dependency-risk:
  osv:
    enabled: true
    batch-size: 50
    advisory-fetch-threads: 8
    output-directory: src/main/resources/osv
    max-attempts: 3
    connect-timeout: 10s
    read-timeout: 45s
    retry:
      initial-delay: 1s
      max-delay: 10s
  json-ld:
    context:
      risk: "urn:io-github-pkjpathania:dependency-risk-graph:schema:"

      name: "risk:name"
      group: "risk:group"
      version: "risk:version"
      purl: "risk:purl"
      bomRef: "risk:bomRef"
      componentType: "risk:componentType"

      rootOccurrence:
        "[@id]": "risk:rootOccurrence"
        "[@type]": "@id"

      belongsToImport:
        "[@id]": "risk:belongsToImport"
        "[@type]": "@id"

      dependsOn:
        "[@id]": "risk:dependsOn"
        "[@type]": "@id"

      instanceOf:
        "[@id]": "risk:instanceOf"
        "[@type]": "@id"
