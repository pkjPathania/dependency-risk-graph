spring:
  application:
    name: dependency-risk-graph
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

dependency-risk:
  osv:
    enabled: true
    batch-size: 50
    advisory-fetch-threads: 8
    output-directory: src/main/resources/osv
    max-attempts: 3
    connect-timeout: 10s
    read-timeout: 45s
    retry:
      initial-delay: 1s
      max-delay: 10s
